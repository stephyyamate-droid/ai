<!DOCTYPE html>
<html>
<head>
<title>Veltrix.ai</title>

<style>
*{
    box-sizing:border-box;
    font-family:Inter,Arial;
}

body{
    margin:0;
    background:#050505;
    color:white;
    height:100vh;
    overflow:hidden;
}


header{
    height:60px;
    border-bottom:1px solid #222;
    display:flex;
    align-items:center;
    padding:0 25px;
    justify-content:space-between;
}


.logo{
    font-size:22px;
    font-weight:800;
}

.logo span{
    color:#8b5cff;
}


button{
    background:#8b5cff;
    color:white;
    border:0;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
}



.container{
    display:grid;
    grid-template-columns:320px 1fr 420px;
    height:calc(100vh - 60px);
}



/* CHAT */

.chat{
    border-right:1px solid #222;
    padding:20px;
}


.messages{
    height:80%;
    overflow:auto;
}


.message{
    background:#111;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
}


.input{
    display:flex;
    gap:10px;
}


input{
    flex:1;
    background:#111;
    color:white;
    border:1px solid #333;
    padding:12px;
    border-radius:8px;
}



/* EDITOR */


.editor{
    background:#080808;
    padding:20px;
}


.code{
    background:#111;
    height:90%;
    border-radius:10px;
    padding:20px;
    color:#00ff99;
    font-family:monospace;
}



/* PREVIEW */


.preview{
    border-left:1px solid #222;
    padding:20px;
}


iframe{
    width:100%;
    height:90%;
    background:white;
    border-radius:10px;
    border:0;
}


.files{
    background:#111;
    padding:10px;
    border-radius:8px;
}


</style>

</head>


<body>


<header>

<div class="logo">
<span>V</span> Veltrix.ai
</div>

<button>
Deploy
</button>

</header>



<div class="container">


<div class="chat">

<h3>AI Builder</h3>


<div class="messages">

<div class="message">
🤖 Describe your website idea.
</div>


</div>


<div class="input">

<input placeholder="Build a Roblox dashboard...">

<button>
Create
</button>

</div>


</div>




<div class="editor">

<h3>Files</h3>


<div class="files">

📄 index.html<br>
🎨 style.css<br>
⚙ app.js

</div>


<h3>Code</h3>


<div class="code">

// AI generated code appears here

</div>


</div>




<div class="preview">


<h3>Preview</h3>

<iframe></iframe>


</div>



</div>


</body>
</html>
