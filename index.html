<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>V Veltrix.ai</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>


<div class="logo">

<span>V</span> Veltrix.ai

</div>


<div class="actions">

<button id="download">
Download ZIP
</button>


<button class="deploy">
Deploy
</button>


</div>


</header>





<div class="app">





<!-- CHAT -->


<aside class="chat">


<h2>
<span class="v-logo">V</span> Veltrix.ai
</h2>



<div id="messages">


<div class="message ai">

Welcome to V Veltrix.ai.<br><br>

Describe the website you want me to build.

</div>


</div>





<div class="prompt-box">


<input

id="prompt"

placeholder="Create a modern AI dashboard..."

>


<button id="generate">

➤

</button>


</div>



</aside>







<!-- EDITOR -->


<section class="editor-panel">


<div class="files">


<h3>
Project
</h3>



<button class="file active" data-file="index.html">

📄 index.html

</button>



<button class="file" data-file="style.css">

🎨 style.css

</button>




<button class="file" data-file="app.js">

⚙ app.js

</button>



</div>





<div class="code">


<h3>
Code Editor
</h3>



<pre id="code">

// V Veltrix.ai generated code

</pre>



</div>


</section>









<!-- PREVIEW -->


<section class="preview">


<h3>
Live Preview
</h3>



<div class="browser">


<div class="browser-bar">

● ● ●

</div>


<iframe id="preview"></iframe>


</div>



</section>






</div>




<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="app.js"></script>



</body>

</html>
