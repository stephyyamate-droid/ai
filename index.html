<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Veltrix.ai - AI Website Builder</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


<header>

    <div class="logo">
        <span>V</span> Veltrix.ai
    </div>


    <div class="actions">

        <button>
            Save
        </button>

        <button>
            Deploy
        </button>

    </div>

</header>



<main class="workspace">



<!-- AI CHAT -->

<section class="chat-panel">


<h2>
🤖 Veltrix AI
</h2>


<div class="messages" id="messages">


<div class="ai-message">

Hello! I can build websites, apps, dashboards, and scripts.

</div>


</div>



<div class="prompt-box">


<input 
id="prompt"
placeholder="Create a modern gaming website..."
>


<button id="generate">
Generate
</button>


</div>


</section>





<!-- CODE AREA -->

<section class="code-panel">


<div class="files">


<h3>
Project
</h3>


<div class="file active">
📄 index.html
</div>


<div class="file">
🎨 style.css
</div>


<div class="file">
⚙ app.js
</div>


</div>





<div class="editor">


<div class="editor-top">

Code Editor

</div>


<pre id="code">

// AI generated code appears here

</pre>


</div>



</section>





<!-- PREVIEW -->


<section class="preview-panel">


<h2>
Live Preview
</h2>


<div class="browser">


<div class="browser-bar">

● ● ●

</div>



<iframe 
id="preview">
</iframe>



</div>


</section>



</main>



<script src="app.js"></script>


</body>

</html>
